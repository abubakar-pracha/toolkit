<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><link rel="stylesheet" href="/css/style.css"><title>QR Code Generator — ToolKit</title></head><body><nav><div class="container"><a href="/" class="logo"><span>🔧</span>ToolKit</a><div class="nav-links"><a href="/tools/">Tools</a><a href="https://toolkitblogcom.wordpress.com" target="_blank">Blog</a><button class="theme-btn" onclick="toggleTheme()">🌙</button></div></div></nav><main class="tool-page"><div class="breadcrumb"><a href="/tools/">← All Tools</a></div><h1>QR Code Generator</h1><p class="tool-desc">Create QR codes for any text or URL.</p><div class="box"><textarea id="txt" rows="3" placeholder="Enter text or URL..."></textarea><button class="btn" onclick="gen()" style="margin-top:1rem;width:100%">Generate QR Code</button><div id="out" style="display:none;margin-top:1rem;text-align:center"><img id="img" style="max-width:200px"><div style="margin-top:.5rem"><button class="btn btn-sm" onclick="dl()">Download</button></div></div></div></main><footer><div class="container"><p>© 2026 ToolKit</p><div><a href="/about.html">About</a><a href="/privacy.html">Privacy</a><a href="/contact.html">Contact</a><a href="/terms.html">Terms</a></div></div></footer><script src="/js/main.js"></script><script>
function gen(){
var t=document.getElementById("txt").value;
if(!t)return;
var url="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(t);
document.getElementById("img").src=url;
document.getElementById("out").style.display="block";
}
function dl(){
var a=document.createElement("a");a.href=document.getElementById("img").src;a.download="qrcode.png";a.click();
}
</script></body></html>
