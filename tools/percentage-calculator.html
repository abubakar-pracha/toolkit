<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><link rel="stylesheet" href="/css/style.css"><title>Percentage Calculator — ToolKit</title></head><body><nav><div class="container"><a href="/" class="logo"><span>🔧</span>ToolKit</a><div class="nav-links"><a href="/tools/">Tools</a><a href="https://toolkitblogcom.wordpress.com" target="_blank">Blog</a><button class="theme-btn" onclick="toggleTheme()">🌙</button></div></div></nav><main class="tool-page"><div class="breadcrumb"><a href="/tools/">← All Tools</a></div><h1>Percentage Calculator</h1><p class="tool-desc">Calculate percentages, discounts, and increases.</p><div class="box"><h3 style="margin-bottom:1rem">What is <input type="number" id="p1" placeholder="20" style="width:80px;display:inline"> % of <input type="number" id="v1" placeholder="100" style="width:80px;display:inline"> ?</h3><button class="btn" onclick="calc1()">Calculate</button><div id="r1" class="result" style="display:none"></div></div><div class="box"><h3 style="margin-bottom:1rem"><input type="number" id="v2" placeholder="20" style="width:80px;display:inline"> is what % of <input type="number" id="t2" placeholder="100" style="width:80px;display:inline"> ?</h3><button class="btn" onclick="calc2()">Calculate</button><div id="r2" class="result" style="display:none"></div></div><div class="box"><h3 style="margin-bottom:1rem">Discount: <input type="number" id="price" placeholder="100" style="width:80px;display:inline"> with <input type="number" id="disc" placeholder="20" style="width:80px;display:inline"> % off</h3><button class="btn" onclick="calc3()">Calculate</button><div id="r3" class="result" style="display:none"></div></div></main><footer><div class="container"><p>© 2026 ToolKit</p><div><a href="/about.html">About</a><a href="/privacy.html">Privacy</a><a href="/contact.html">Contact</a><a href="/terms.html">Terms</a></div></div></footer><script src="/js/main.js"></script><script>
function calc1(){
var p=parseFloat(document.getElementById("p1").value)||0;
var v=parseFloat(document.getElementById("v1").value)||0;
document.getElementById("r1").textContent=(p/100*v).toFixed(2);
document.getElementById("r1").style.display="block";
}
function calc2(){
var v=parseFloat(document.getElementById("v2").value)||0;
var t=parseFloat(document.getElementById("t2").value)||0;
if(t)document.getElementById("r2").textContent=((v/t)*100).toFixed(2)+"%";
document.getElementById("r2").style.display="block";
}
function calc3(){
var p=parseFloat(document.getElementById("price").value)||0;
var d=parseFloat(document.getElementById("disc").value)||0;
var off=p*(d/100);
var final=p-off;
document.getElementById("r3").textContent="Save: "+off.toFixed(2)+" | Final: "+final.toFixed(2);
document.getElementById("r3").style.display="block";
}
</script></body></html>
