<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><link rel="stylesheet" href="/css/style.css"><title>BMI Calculator — ToolKit</title></head><body><nav><div class="container"><a href="/" class="logo"><span>🔧</span>ToolKit</a><div class="nav-links"><a href="/tools/">Tools</a><a href="https://toolkitblogcom.wordpress.com" target="_blank">Blog</a><button class="theme-btn" onclick="toggleTheme()">🌙</button></div></div></nav><main class="tool-page"><div class="breadcrumb"><a href="/tools/">← All Tools</a></div><h1>BMI Calculator</h1><p class="tool-desc">Calculate your Body Mass Index with health category.</p><div class="box"><div style="display:flex;gap:.5rem;margin-bottom:1rem"><button class="btn" id="bm" onclick="setM()" style="flex:1">Metric (kg,cm)</button><button class="btn btn-sm" id="bi" onclick="setI()" style="flex:1;background:var(--bg);color:var(--text)">Imperial (lbs,in)</button></div><label style="font-size:.85rem;color:var(--muted)">Height <span id="hu">(cm)</span></label><input type="number" id="h" placeholder="175" oninput="calc()" style="margin:.3rem 0 1rem"><label style="font-size:.85rem;color:var(--muted)">Weight <span id="wu">(kg)</span></label><input type="number" id="w" placeholder="70" oninput="calc()" style="margin:.3rem 0"><div id="out" style="display:none;margin-top:1.5rem;text-align:center;padding:1.5rem;background:var(--bg);border-radius:8px"><div id="bv" style="font-size:2.5rem;font-weight:800">--</div><div id="bc" style="margin-top:.5rem">--</div></div></div><div class="faq"><h3>FAQ</h3><div class="faq-item"><h4>What is healthy BMI?</h4><p>18.5 to 24.9 is considered healthy.</p></div></div></main><footer><div class="container"><p>© 2026 ToolKit</p><div><a href="/about.html">About</a><a href="/privacy.html">Privacy</a><a href="/contact.html">Contact</a><a href="/terms.html">Terms</a></div></div></footer><script src="/js/main.js"></script><script>
var u="m";
function setM(){u="m";document.getElementById("bm").style.background="var(--primary)";document.getElementById("bm").style.color="#fff";document.getElementById("bi").style.background="var(--bg)";document.getElementById("bi").style.color="var(--text)";document.getElementById("hu").textContent="(cm)";document.getElementById("wu").textContent="(kg)";document.getElementById("h").placeholder="175";document.getElementById("w").placeholder="70";calc();}
function setI(){u="i";document.getElementById("bi").style.background="var(--primary)";document.getElementById("bi").style.color="#fff";document.getElementById("bm").style.background="var(--bg)";document.getElementById("bm").style.color="var(--text)";document.getElementById("hu").textContent="(inches)";document.getElementById("wu").textContent="(lbs)";document.getElementById("h").placeholder="69";document.getElementById("w").placeholder="154";calc();}
function calc(){
var h=parseFloat(document.getElementById("h").value);
var w=parseFloat(document.getElementById("w").value);
if(!h||!w||h<=0||w<=0){document.getElementById("out").style.display="none";return;}
var bmi=u==="m"?w/Math.pow(h/100,2):(w/Math.pow(h,2))*703;
var v=bmi.toFixed(1);
var cat,col;
if(bmi<18.5){cat="Underweight";col="#3b82f6";}
else if(bmi<25){cat="Normal";col="#10b981";}
else if(bmi<30){cat="Overweight";col="#f59e0b";}
else{cat="Obese";col="#ef4444";}
document.getElementById("bv").textContent=v;
document.getElementById("bv").style.color=col;
document.getElementById("bc").textContent=cat;
document.getElementById("bc").style.color=col;
document.getElementById("out").style.display="block";
}
</script></body></html>
