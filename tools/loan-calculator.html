<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><link rel="stylesheet" href="/css/style.css"><title>Loan EMI Calculator — ToolKit</title></head><body><nav><div class="container"><a href="/" class="logo"><span>🔧</span>ToolKit</a><div class="nav-links"><a href="/tools/">Tools</a><a href="https://toolkitblogcom.wordpress.com" target="_blank">Blog</a><button class="theme-btn" onclick="toggleTheme()">🌙</button></div></div></nav><main class="tool-page"><div class="breadcrumb"><a href="/tools/">← All Tools</a></div><h1>Loan EMI Calculator</h1><p class="tool-desc">Calculate Equated Monthly Installment.</p><div class="box"><label style="font-size:.85rem;color:var(--muted)">Loan Amount</label><input type="number" id="p" placeholder="100000" style="margin:.3rem 0 1rem"><label style="font-size:.85rem;color:var(--muted)">Interest Rate (% per year)</label><input type="number" id="r" placeholder="8.5" step="0.1" style="margin:.3rem 0 1rem"><label style="font-size:.85rem;color:var(--muted)">Tenure (years)</label><input type="number" id="t" placeholder="5" style="margin:.3rem 0 1rem"><button class="btn" onclick="calc()" style="width:100%">Calculate EMI</button><div id="out" style="display:none;margin-top:1rem"><div class="grid" style="grid-template-columns:repeat(2,1fr);gap:.5rem;margin-top:1rem"><div class="box" style="text-align:center;padding:1rem"><div id="emi" style="font-size:1.3rem;font-weight:700;color:var(--primary)">--</div><div style="font-size:.75rem;color:var(--muted)">Monthly EMI</div></div><div class="box" style="text-align:center;padding:1rem"><div id="total" style="font-size:1.3rem;font-weight:700;color:var(--primary)">--</div><div style="font-size:.75rem;color:var(--muted)">Total Payment</div></div><div class="box" style="text-align:center;padding:1rem"><div id="interest" style="font-size:1.3rem;font-weight:700;color:var(--primary)">--</div><div style="font-size:.75rem;color:var(--muted)">Total Interest</div></div></div></div></div></main><footer><div class="container"><p>© 2026 ToolKit</p><div><a href="/about.html">About</a><a href="/privacy.html">Privacy</a><a href="/contact.html">Contact</a><a href="/terms.html">Terms</a></div></div></footer><script src="/js/main.js"></script><script>
function calc(){
var p=parseFloat(document.getElementById("p").value)||0;
var r=parseFloat(document.getElementById("r").value)||0;
var t=parseFloat(document.getElementById("t").value)||0;
if(!p||!r||!t)return;
var n=t*12;
var R=r/(12*100);
var emi=p*R*Math.pow(1+R,n)/(Math.pow(1+R,n)-1);
var total=emi*n;
var interest=total-p;
document.getElementById("emi").textContent=emi.toFixed(0);
document.getElementById("total").textContent=total.toFixed(0);
document.getElementById("interest").textContent=interest.toFixed(0);
document.getElementById("out").style.display="block";
}
</script></body></html>
