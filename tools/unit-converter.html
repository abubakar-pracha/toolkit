<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><link rel="stylesheet" href="/css/style.css"><title>Unit Converter — ToolKit</title></head><body><nav><div class="container"><a href="/" class="logo"><span>🔧</span>ToolKit</a><div class="nav-links"><a href="/tools/">Tools</a><a href="/blog/">Blog</a><button class="theme-btn" onclick="toggleTheme()">🌙</button></div></div></nav><main class="tool-page"><div class="breadcrumb"><a href="/tools/">← All Tools</a></div><h1>Unit Converter</h1><p class="tool-desc">Convert length, weight, and temperature.</p><div class="box"><h3>Length</h3><div style="display:flex;gap:1rem;align-items:center;margin:.5rem 0"><input type="number" id="lm" placeholder="Meters" oninput="convL()" style="flex:1"><span>→</span><input type="text" id="lf" readonly placeholder="Feet" style="flex:1;background:var(--bg)"></div></div><div class="box"><h3>Weight</h3><div style="display:flex;gap:1rem;align-items:center;margin:.5rem 0"><input type="number" id="wk" placeholder="Kg" oninput="convW()" style="flex:1"><span>→</span><input type="text" id="wp" readonly placeholder="Pounds" style="flex:1;background:var(--bg)"></div></div><div class="box"><h3>Temperature</h3><div style="display:flex;gap:1rem;align-items:center;margin:.5rem 0"><input type="number" id="tc" placeholder="Celsius" oninput="convT()" style="flex:1"><span>→</span><input type="text" id="tf" readonly placeholder="Fahrenheit" style="flex:1;background:var(--bg)"></div></div></main><footer><div class="container"><p>© 2026 ToolKit</p><div><a href="/about.html">About</a><a href="/privacy.html">Privacy</a><a href="/contact.html">Contact</a><a href="/terms.html">Terms</a></div></div></footer><script src="/js/main.js"></script><script>
function convL(){var m=document.getElementById("lm").value;if(m)document.getElementById("lf").value=(m*3.28084).toFixed(2)+" ft";}
function convW(){var k=document.getElementById("wk").value;if(k)document.getElementById("wp").value=(k*2.20462).toFixed(2)+" lbs";}
function convT(){var c=document.getElementById("tc").value;if(c!=="")document.getElementById("tf").value=((c*9/5)+32).toFixed(1)+" °F";}
</script></body></html>
