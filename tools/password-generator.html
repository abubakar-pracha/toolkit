<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><link rel="stylesheet" href="/css/style.css"><title>Password Generator — ToolKit</title></head><body><nav><div class="container"><a href="/" class="logo"><span>🔧</span>ToolKit</a><div class="nav-links"><a href="/tools/">Tools</a><a href="/blog/">Blog</a><button class="theme-btn" onclick="toggleTheme()">🌙</button></div></div></nav><main class="tool-page"><div class="breadcrumb"><a href="/tools/">← All Tools</a></div><h1>Password Generator</h1><p class="tool-desc">Generate secure random passwords.</p><div class="box"><label style="font-size:.85rem;color:var(--muted)">Length</label><input type="number" id="len" value="12" min="4" max="64" style="margin:.3rem 0 1rem"><div style="margin-bottom:1rem"><label style="display:flex;align-items:center;gap:.5rem;margin:.3rem 0"><input type="checkbox" id="uc" checked> Uppercase (A-Z)</label><label style="display:flex;align-items:center;gap:.5rem;margin:.3rem 0"><input type="checkbox" id="lc" checked> Lowercase (a-z)</label><label style="display:flex;align-items:center;gap:.5rem;margin:.3rem 0"><input type="checkbox" id="num" checked> Numbers (0-9)</label><label style="display:flex;align-items:center;gap:.5rem;margin:.3rem 0"><input type="checkbox" id="sym"> Symbols (!@#$)</label></div><button class="btn" onclick="gen()" style="width:100%">Generate Password</button><div id="res" class="result" style="display:none;margin-top:1rem"></div><div id="acts" style="display:none;margin-top:.5rem"><button class="btn btn-sm" onclick="cp()">Copy</button></div></div><div class="faq"><h3>FAQ</h3><div class="faq-item"><h4>Is this secure?</h4><p>Passwords are generated locally in your browser.</p></div></div></main><footer><div class="container"><p>© 2026 ToolKit</p><div><a href="/about.html">About</a><a href="/privacy.html">Privacy</a><a href="/contact.html">Contact</a><a href="/terms.html">Terms</a></div></div></footer><script src="/js/main.js"></script><script>
var r="";
function gen(){
var len=parseInt(document.getElementById("len").value)||12;
var uc=document.getElementById("uc").checked;
var lc=document.getElementById("lc").checked;
var num=document.getElementById("num").checked;
var sym=document.getElementById("sym").checked;
var chars="";
if(uc)chars+="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
if(lc)chars+="abcdefghijklmnopqrstuvwxyz";
if(num)chars+="0123456789";
if(sym)chars+="!@#$%^&*()_+-=[]{}|;:,.<>?";
if(!chars){alert("Select at least one option");return;}
r="";
for(var i=0;i<len;i++)r+=chars.charAt(Math.floor(Math.random()*chars.length));
document.getElementById("res").textContent=r;
document.getElementById("res").style.display="block";
document.getElementById("acts").style.display="block";
}
function cp(){navigator.clipboard.writeText(r).then(function(){alert("Copied!")});}
</script></body></html>
